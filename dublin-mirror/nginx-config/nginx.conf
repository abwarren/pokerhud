        }

        location = /pokerbet {
            return 301 /pokerbet/pokerbet-mirror.html;
        }

        # ---- HEALTH CHECK ----
        location /health {
            proxy_pass http://127.0.0.1:5000/api/health;
            proxy_http_version 1.1;
