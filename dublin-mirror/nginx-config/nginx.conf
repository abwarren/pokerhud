worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    server_tokens off;
    server_names_hash_bucket_size 128;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 2m;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=30r/m;

    # Redirect HTTP to HTTPS for legacy subdomain
    server {
        listen 80;
        server_name ec2-34-241-209-143.eu-west-1.compute.amazonaws.com;
        return 301 https://$server_name:8080$request_uri;
    }

    # Redirect HTTP to HTTPS for main domain
    server {
        listen 80;
        server_name potlimitomaha.xyz;
        return 301 https://$server_name$request_uri;
    }

    # =========================================================================
    # MAIN DOMAIN - potlimitomaha.xyz (mirrors nuts4poker.com)
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name potlimitomaha.xyz;

        ssl_certificate /opt/nginx-config/certs/potlimitomaha.xyz.crt;
        ssl_certificate_key /opt/nginx-config/certs/potlimitomaha.xyz.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), screen-wake-lock=(self)" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- ROOT -> ENGINE ----
        location = / {
            return 301 /engine;
        }

        # ---- PORTAL ----
        location ~ ^/portal/?$ {
            root /opt/plo-engine/static;
            try_files /portal.html =404;
            add_header Cache-Control no-cache always;
        }

        # ---- ENGINE UI (static files) ----
        location = /engine {
            return 301 /engine/;
        }

        location ^~ /engine/assets/ {
            alias /opt/plo-engine/static/assets/;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location = /engine/ {
            alias /opt/plo-engine/static/;
            index index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /engine/index.html {
            alias /opt/plo-engine/static/index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location /engine/ {
            alias /opt/plo-engine/static/;
            try_files $uri =404;
        }

        location ^~ /assets/ {
            alias /opt/plo-engine/static/assets/;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # ---- REMOTE CONTROL UI (W4P branding for potlimitomaha.xyz) ----
        location ~ ^/remote/?$ {
            root /opt/plo-engine/static;
            try_files /remote-w4p.html =404;
            add_header Cache-Control "no-cache" always;
        }

        # ---- BLM (Basketball League Manager) ----
        location ~ ^/league-manager/?$ {
            root /opt/plo-engine/static;
            try_files /blm.html =404;
            add_header Cache-Control "no-cache" always;
        }

        # ---- REMOTE BUTTON CONTROL (per-seat PokerBet style) ----
        location ~ ^/remotebutton/?$ {
            root /opt/plo-engine/static;
            try_files /remotebutton.html =404;
            add_header Cache-Control "no-cache" always;
        }

        # ---- COLLECTOR API (proxied to Flask with CORS) ----
        location /collector/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type" always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;
            proxy_pass http://127.0.0.1:5000/collector/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # ---- N4P SCRIPTS (CORS) ----
        location = /n4p.js {
            root /opt/plo-engine/static;
            try_files /n4p.js =404;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Content-Type "application/javascript" always;
            add_header Cache-Control "no-cache" always;
        }

        location = /n4p-full.js {
            root /opt/plo-engine/static;
            try_files /n4p-full.js =404;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Content-Type "application/javascript" always;
            add_header Cache-Control "no-cache" always;
        }

        # ---- W4P SCRIPTS (CORS) ----
        location = /w4p.js {
            root /opt/plo-engine/static;
            try_files /w4p.js =404;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Content-Type "application/javascript" always;
            add_header Cache-Control "no-cache" always;
        }

        location = /w4p-full.js {
            root /opt/plo-engine/static;
            try_files /w4p-full.js =404;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Content-Type "application/javascript" always;
            add_header Cache-Control "no-cache" always;
        }

        # ---- PUBLIC DOWNLOADS ----
        location /dl/ {
            alias /opt/plo-engine/static/dl/;
            autoindex off;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ---- CHROME EXTENSION ----
        location /ext/ {
            alias /opt/plo-engine/static/ext/;
            autoindex off;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache" always;
        }

        # ---- SOCKET.IO STUB ----
        location /socket.io/ {
            return 200 '{"ok":false,"error":"socket.io not configured"}';
            add_header Content-Type application/json;
        }

        # ---- STOP/START UI ----
        location = /stopstart {
            return 301 /stopstart/;
        }
        location = /stopstart/ {
            alias /opt/plo-engine/static/;
            try_files /stopstart.html =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # ---- EQUITY ENGINE API -> localhost:5050 ----
        location /api/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://127.0.0.1:5050/api/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;
        }

        location /api/run-batch {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:5050/api/run-batch;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_set_header Connection "";
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
        }

        location /api/run {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:5050/api/run;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;
            proxy_connect_timeout 5s;
        }

        location /api/stream/ {
            proxy_pass http://127.0.0.1:5050/api/stream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_set_header Connection "";
            proxy_cache off;
            #chunked_transfer_encoding off;
            proxy_set_header X-Accel-Buffering no;
        }

        location /api/results/ {
