            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /api/tracker/ {
            proxy_pass http://127.0.0.1:5050/api/tracker/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # =====================================================================
        # W4P REMOTE CONTROL API ROUTES -> localhost:5003 (plo-w4p Flask)
        # =====================================================================
        # WARNING: These routes MUST proxy to port 5003, NOT 5000!
        #   - Port 5003 = plo-w4p.service (potlimitomaha.xyz remote control)
        #   - Port 5000 = plo-equity (nuts4poker.com, completely separate)
        #   - Port 5050 = equity engine
        # WARNING: Do NOT add CORS headers (Access-Control-*) in these blocks!
        #   Flask CORS(app) handles all CORS. Duplicate headers = browser rejection.
        # WARNING: After sed -i on this file, run "docker restart nginx-proxy"
        #   (not just reload) because sed -i changes the inode and breaks bind mount.
        # =====================================================================
        location /api/commands/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;
                add_header Access-Control-Allow-Private-Network "true" always;
                add_header Access-Control-Max-Age 3600;
                return 204;
            }
            proxy_pass http://127.0.0.1:5003/api/commands/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ---- SNAPSHOT API -> localhost:5003 (plo-w4p) ----
        location /api/snapshot {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;
                add_header Access-Control-Allow-Private-Network "true" always;
                add_header Access-Control-Max-Age 3600;
                return 204;
            }
            proxy_pass http://127.0.0.1:5003/api/snapshot;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/table/ {
            proxy_pass http://127.0.0.1:5003/api/table/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location = /api/tables {
            proxy_pass http://127.0.0.1:5003/api/tables;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/health {
            proxy_pass http://127.0.0.1:5003/api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ---- COLLECTOR API -> localhost:5003 (plo-w4p) ----
        location /api/collector/ {
            proxy_pass http://127.0.0.1:5003/api/collector/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Catch-all /api/ -> Flask (port 5003 for engine/equity endpoints)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:5003/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;

        }

        # ---- HUD API ----
        location /api/hud/ {
            proxy_pass http://127.0.0.1:5001/api/hud/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
