<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Dashboard - PLO Remote</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        body { background: #1a1a2e; color: #fff; font-family: system-ui; margin: 0; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 32px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .panel {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
        }
        .panel-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .refresh-btn {
            background: #4a9eff;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .refresh-btn:hover { background: #3a8eef; }
        .status-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 8px 0;
            background: #0f3460;
            border-radius: 6px;
            border-left: 4px solid #4a9eff;
        }
        .status-row.stale { border-left-color: #e74c3c; }
        .status-row.active { border-left-color: #2ecc71; }
        .log-entry {
            padding: 8px;
            margin: 6px 0;
            background: #0f3460;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            overflow-x: auto;
        }
        .log-entry.error { border-left: 3px solid #e74c3c; }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge.active { background: #2ecc71; color: #fff; }
        .badge.stale { background: #e74c3c; color: #fff; }
        .badge.empty { background: #666; color: #fff; }
        .timestamp { color: #999; font-size: 12px; }
        .no-data { text-align: center; padding: 40px; color: #666; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { color: #4a9eff; font-weight: 600; }
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Debug Dashboard</h1>
            <p>Real-time System Monitoring</p>
        </div>

        <div class="grid">
            <!-- Bot Heartbeats -->
            <div class="panel">
                <div class="panel-header">
                    💓 Bot Heartbeats
                    <button class="refresh-btn" onclick="fetchHeartbeats()">Refresh</button>
                </div>
                <div id="heartbeats-content">Loading...</div>
            </div>

            <!-- System Health -->
            <div class="panel">
                <div class="panel-header">
                    ⚡ System Health
                    <button class="refresh-btn" onclick="fetchHealth()">Refresh</button>
                </div>
                <div id="health-content">Loading...</div>
            </div>

            <!-- Recent Snapshots -->
            <div class="panel full-width">
                <div class="panel-header">
                    📸 Recent Snapshots (Last 10)
                    <button class="refresh-btn" onclick="fetchSnapshots()">Refresh</button>
                </div>
                <div id="snapshots-content">Loading...</div>
            </div>

            <!-- Validation Errors -->
            <div class="panel full-width">
                <div class="panel-header">
                    ⚠️ Validation Errors
                    <button class="refresh-btn" onclick="fetchErrors()">Refresh</button>
                </div>
                <div id="errors-content">No errors logged</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchHeartbeats() {
            try {
                const res = await fetch('/api/bots/heartbeats');
                const data = await res.json();

                if (!data.ok || Object.keys(data.heartbeats).length === 0) {
                    document.getElementById('heartbeats-content').innerHTML = '<div class="no-data">No bots tracked yet</div>';
                    return;
                }

                let html = '';
                for (const [botId, status] of Object.entries(data.heartbeats)) {
                    const statusClass = status.stale ? 'stale' : 'active';
                    const badge = status.stale ? 'stale' : 'active';
                    const age = status.last_seen_ago ? status.last_seen_ago.toFixed(2) + 's ago' : 'N/A';

                    html += `
                        <div class="status-row ${statusClass}">
                            <div>
                                <strong>${botId}</strong>
                                <span class="badge ${badge}">${status.status.toUpperCase()}</span>
                            </div>
                            <div class="timestamp">${age}</div>
                        </div>
                    `;
                }

                document.getElementById('heartbeats-content').innerHTML = html;
            } catch (err) {
                document.getElementById('heartbeats-content').innerHTML = `<div class="no-data">Error: ${err.message}</div>`;
            }
        }

        async function fetchHealth() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();

                const html = `
                    <div class="status-row active">
                        <span>Status</span>
                        <span class="badge active">${data.ok ? 'HEALTHY' : 'ERROR'}</span>
                    </div>
                    <div class="status-row">
                        <span>Version</span>
                        <span>${data.version || 'N/A'}</span>
                    </div>
                    <div class="status-row">
                        <span>Environment</span>
                        <span>${data.environment || 'N/A'}</span>
                    </div>
                    <div class="status-row">
                        <span>Timestamp</span>
                        <span class="timestamp">${new Date(data.timestamp).toLocaleString()}</span>
                    </div>
                `;

                document.getElementById('health-content').innerHTML = html;
            } catch (err) {
                document.getElementById('health-content').innerHTML = `<div class="no-data">Error: ${err.message}</div>`;
            }
        }

        async function fetchSnapshots() {
            try {
                const res = await fetch('/api/tables');
                const data = await res.json();

                if (!data.ok || data.tables.length === 0) {
                    document.getElementById('snapshots-content').innerHTML = '<div class="no-data">No snapshots yet</div>';
                    return;
                }

                let html = '<table><tr><th>Table ID</th><th>Seats</th><th>Street</th><th>Last Updated</th></tr>';

                data.tables.slice(0, 10).forEach(table => {
                    const seatsCount = table.seats ? table.seats.length : 0;
                    const timestamp = new Date(table.last_updated * 1000).toLocaleString();

                    html += `
                        <tr>
                            <td>${table.table_id}</td>
                            <td>${seatsCount}</td>
                            <td>${table.street || 'N/A'}</td>
                            <td class="timestamp">${timestamp}</td>
                        </tr>
                    `;
                });

                html += '</table>';
                document.getElementById('snapshots-content').innerHTML = html;
            } catch (err) {
                document.getElementById('snapshots-content').innerHTML = `<div class="no-data">Error: ${err.message}</div>`;
            }
        }

        async function fetchErrors() {
            // Try to fetch validation errors from log
            const content = document.getElementById('errors-content');
            content.innerHTML = '<div class="no-data">Error logging available in /tmp/invalid_snapshots.log on server</div>';
        }

        // Auto-refresh
        fetchHeartbeats();
        fetchHealth();
        fetchSnapshots();
        fetchErrors();

        setInterval(() => {
            fetchHeartbeats();
            fetchHealth();
            fetchSnapshots();
        }, 5000);
    </script>
</body>
</html>
