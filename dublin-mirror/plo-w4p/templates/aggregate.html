<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aggregate Table - 8 Bot Self-Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 2em;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .header .subtitle {
      color: #aaa;
      font-size: 0.9em;
    }

    .status-bar {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 10px #4caf50;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .table-container {
      background: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .board-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .board-label {
      font-weight: bold;
      font-size: 1.1em;
      margin-right: 10px;
    }

    .card {
      color: #ffffff;
      padding: 15px 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.2em;
      min-width: 50px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .card.hearts { background: #e74c3c; }
    .card.diamonds { background: #3498db; }
    .card.clubs { background: #2ecc71; }
    .card.spades { background: #34495e; }

    .seats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    @media (max-width: 1200px) {
      .seats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .seat-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 15px;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .seat-card.active {
      border-color: #4caf50;
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
    }

    .seat-card.empty {
      opacity: 0.4;
    }

    .seat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .seat-title {
      font-weight: bold;
      font-size: 1.1em;
    }

    .bot-id {
      font-size: 0.8em;
      color: #ffc107;
    }

    .cards-display {
      display: flex;
      gap: 5px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .mini-card {
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 6px;
      border-radius: 5px;
      font-size: 0.9em;
      font-weight: bold;
      min-width: 35px;
      text-align: center;
    }

    .seat-stats {
      margin-top: 10px;
      font-size: 0.85em;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }

    .stat-label {
      color: #aaa;
    }

    .stat-value {
      font-weight: bold;
    }

    .action-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8em;
      font-weight: bold;
      margin-top: 8px;
    }

    .action-badge.fold { background: #e74c3c; }
    .action-badge.check { background: #2ecc71; }
    .action-badge.call { background: #3498db; }
    .action-badge.raise { background: #f39c12; }
    .action-badge.bet { background: #9b59b6; }

    .waiting-message {
      text-align: center;
      padding: 60px 20px;
      font-size: 1.3em;
      color: #aaa;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🃏 Aggregate Table</h1>
    <div class="subtitle">8-Bot Self-Player View (Visible Cards Only)</div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot"></div>
      <span>Table ID: <strong id="table-id">-</strong></span>
    </div>
    <div class="status-item">
      <span>Cluster: <strong id="cluster-id">-</strong></span>
    </div>
    <div class="status-item">
      <span>Updated: <strong id="last-updated">-</strong></span>
    </div>
  </div>

  <div class="table-container">
    <div class="board-display" id="board-display">
      <span class="board-label">Board:</span>
      <div id="board-cards">-</div>
    </div>

    <div id="table-content">
      <div class="waiting-message">
        <div class="spinner"></div>
        <p>Waiting for aggregate table data...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    const TABLE_ID = 'table4';  // Aggregate table ID
    const POLL_INTERVAL = 500;  // Poll every 500ms

    function getSuitColor(suit) {
      const colors = {
        'h': 'hearts',
        'd': 'diamonds',
        'c': 'clubs',
        's': 'spades'
      };
      return colors[suit] || 'spades';
    }

    function renderCard(cardStr) {
      if (!cardStr || cardStr.length < 2) return '';
      const rank = cardStr.slice(0, -1);
      const suit = cardStr.slice(-1).toLowerCase();
      const color = getSuitColor(suit);
      return `<div class="card ${color}">${rank}${suit.toUpperCase()}</div>`;
    }

    function renderMiniCard(cardStr) {
      if (!cardStr || cardStr.length < 2) return '';
      const rank = cardStr.slice(0, -1);
      const suit = cardStr.slice(-1).toLowerCase();
      const color = getSuitColor(suit);
      return `<div class="mini-card ${color}">${rank}${suit.toUpperCase()}</div>`;
    }

    function formatTimeAgo(timestamp_ms) {
      const now = Date.now();
      const diff = now - timestamp_ms;
      const seconds = Math.floor(diff / 1000);

      if (seconds < 2) return 'just now';
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      return `${hours}h ago`;
    }

    function renderTable(data) {
      if (!data || !data.ok) {
        document.getElementById('table-content').innerHTML =
          '<div class="waiting-message"><p>No data available</p></div>';
        return;
      }

      const table = data;

      // Update status bar
      document.getElementById('table-id').textContent = table.table_id || '-';
      document.getElementById('cluster-id').textContent = table.cluster_id || '-';
      document.getElementById('last-updated').textContent =
        table.last_updated ? formatTimeAgo(table.last_updated) : '-';

      // Render board
      const boardCards = table.seats && table.seats[0] ? table.seats[0].board : [];
      if (boardCards && boardCards.length > 0) {
        document.getElementById('board-cards').innerHTML =
          boardCards.map(renderCard).join('');
      } else {
        document.getElementById('board-cards').innerHTML = '<span style="color: #666;">No cards yet</span>';
      }

      // Render seats
      const seats = table.seats || [];
      let html = '<div class="seats-grid">';

      for (let i = 1; i <= 8; i++) {
        const seat = seats.find(s => s.seat_id === i);

        if (!seat || seat.status === 'empty') {
          html += `
            <div class="seat-card empty">
              <div class="seat-header">
                <div class="seat-title">Seat ${i}</div>
              </div>
              <div style="text-align: center; padding: 20px; color: #666;">Empty</div>
            </div>
          `;
          continue;
        }

        const isActive = seat.status === 'active';
        const cards = seat.cards || [];
        const action = seat.action || '';
        const botId = seat.bot_id || 'unknown';

        html += `
          <div class="seat-card ${isActive ? 'active' : ''}">
            <div class="seat-header">
              <div class="seat-title">Seat ${i}</div>
              <div class="bot-id">${botId}</div>
            </div>

            ${cards.length > 0 ? `
              <div class="cards-display">
                ${cards.map(renderMiniCard).join('')}
              </div>
            ` : '<div style="color: #666; font-size: 0.85em;">No visible cards</div>'}

            <div class="seat-stats">
              <div class="stat-row">
                <span class="stat-label">Stack:</span>
                <span class="stat-value">R${seat.stack || 0}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Bet:</span>
                <span class="stat-value">R${seat.bet || 0}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Status:</span>
                <span class="stat-value">${seat.status}</span>
              </div>
            </div>

            ${action ? `<div class="action-badge ${action.toLowerCase()}">${action.toUpperCase()}</div>` : ''}
          </div>
        `;
      }

      html += '</div>';
      document.getElementById('table-content').innerHTML = html;
    }

    async function fetchTable() {
      try {
        const response = await fetch(`${API_BASE}/aggregate/table/${TABLE_ID}/latest`);
        const data = await response.json();
        renderTable(data);
      } catch (error) {
        console.error('Error fetching table:', error);
        document.getElementById('table-content').innerHTML =
          `<div class="waiting-message"><p>Error loading data: ${error.message}</p></div>`;
      }
    }

    // Initial fetch
    fetchTable();

    // Poll for updates
    setInterval(fetchTable, POLL_INTERVAL);
  </script>
</body>
</html>
