<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N4P Hero Remote Control</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 2em;
      letter-spacing: 2px;
    }

    .hero-badge {
      background: #ff6b35;
      padding: 8px 16px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.9em;
    }

    .main-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 1200px) {
      .main-container {
        grid-template-columns: 1fr;
      }
    }

    .hero-panel {
      background: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 10px;
    }

    .equity-panel {
      background: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 10px;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .status-card .label {
      font-size: 0.85em;
      opacity: 0.8;
      margin-bottom: 5px;
    }

    .status-card .value {
      font-size: 1.3em;
      font-weight: bold;
    }

    .board-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      min-height: 80px;
    }

    .card {
      color: #ffffff;
      padding: 15px 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.2em;
      min-width: 50px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .card.red { background: #ff0000; }
    .card.blue { background: #0066ff; }
    .card.green { background: #00aa00; }
    .card.black { background: #000000; }

    .hero-cards {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
      padding: 20px;
      background: rgba(76, 175, 80, 0.2);
      border-radius: 10px;
      border: 2px solid #4caf50;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .action-btn {
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1em;
    }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
    }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      filter: grayscale(100%);
    }

    .btn-fold { background: #f44336; color: white; }
    .btn-call { background: #2196f3; color: white; }
    .btn-raise { background: #ff5722; color: white; }
    .btn-check { background: #4caf50; color: white; }

    .control-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-control {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      background: #666;
      color: white;
      transition: all 0.2s;
    }

    .btn-control:hover {
      background: #888;
      transform: translateY(-1px);
    }

    .btn-sitout { background: #ff9800; }
    .btn-waitbb { background: #9c27b0; }
    .btn-sitin { background: #4caf50; }

    .warning-message {
      background: rgba(255, 152, 0, 0.2);
      border: 2px solid #ff9800;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: center;
    }

    .waiting-message {
      text-align: center;
      padding: 60px 20px;
      font-size: 1.5em;
      opacity: 0.7;
    }

    .equity-form {
      margin-bottom: 20px;
    }

    .equity-form textarea {
      width: 100%;
      min-height: 200px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      resize: vertical;
    }

    .equity-form button {
      width: 100%;
      padding: 15px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1em;
      margin-top: 10px;
    }

    .equity-form button:hover {
      background: #45a049;
    }

    .equity-result {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      min-height: 100px;
    }

    .equity-result pre {
      color: #4caf50;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
    }

    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-left: 8px;
    }

    .status-indicator.online { 
      background: #4caf50;
      box-shadow: 0 0 10px #4caf50;
    }

    .status-indicator.offline { 
      background: #f44336;
      box-shadow: 0 0 10px #f44336;
    }

    .poll-status {
      font-size: 0.8em;
      opacity: 0.7;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>N4P // HERO REMOTE CONTROL</h1>
      <div class="poll-status" id="poll-status">Polling...</div>
    </div>
    <div class="hero-badge">HERO MODE</div>
  </div>

  <div class="main-container">
    <!-- Left Panel: Hero Control -->
    <div class="hero-panel">
      <div id="hero-content"></div>
    </div>

    <!-- Right Panel: Equity Calculator (ISOLATED) -->
    <div class="equity-panel">
      <h2>Manual Equity Calculator</h2>
      <p style="opacity: 0.7; font-size: 0.9em; margin: 10px 0;">
        Enter scenario manually (NOT connected to live state)
      </p>
      <div class="equity-form">
        <textarea id="equity-input" placeholder="Enter scenario:\n\nHero: AsKdQcJh\nBoard: 7c8d2h\nOpponents: 2\nIterations: 10000"></textarea>
        <button onclick="calculateEquity()">Calculate Equity</button>
      </div>
      <div class="equity-result" id="equity-result">
        <em>Results will appear here...</em>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let pollInterval = null;
    let lastPollTime = null;
    let mockMode = true; // Will auto-detect when real API is available

    // Mock data for testing (remove when Agent 1 API is ready)
    const MOCK_DATA = {
      ok: true,
      state: {
        hero_detected: true,
        hero_seat: 3,
        hero_cards: ['As', 'Kd', 'Qc', 'Jh'],
        board_cards: ['7c', '8d', '2h'],
        street: 'flop',
        seated: true,
        in_hand: true,
        can_act: true,
        allowed_actions: ['fold', 'call', 'raise'],
        waiting_for_big_blind: false
      }
    };

    // Format card with 4-color deck
    function formatCard(card) {
      if (!card) return '';
      const suit = card.slice(-1).toLowerCase();
      const rank = card.slice(0, -1).toUpperCase();
      const suitColor = {
        'h': 'red',
        'd': 'blue',
        'c': 'green',
        's': 'black'
      }[suit] || '';
      const suitSymbol = {
        'h': '♥',
        'd': '♦',
        'c': '♣',
        's': '♠'
      }[suit] || suit;
      return `<span class="card ${suitColor}">${rank}${suitSymbol}</span>`;
    }

    // Send action command
    function sendAction(action) {
      console.log(`Sending action: ${action}`);
      
      fetch(API_BASE + '/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action })
      })
      .then(r => r.json())
      .then(data => {
        console.log('Command response:', data);
        if (!data.ok) {
          alert('Command failed: ' + (data.error || 'Unknown error'));
        }
      })
      .catch(err => {
        console.error('Command error:', err);
        alert('Network error sending command');
      });
    }

    // Send control command
    function sendControl(command) {
      console.log(`Sending control: ${command}`);
      
      fetch(API_BASE + '/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: command })
      })
      .then(r => r.json())
      .then(data => {
        console.log('Control response:', data);
        if (!data.ok) {
          alert('Control failed: ' + (data.error || 'Unknown error'));
        }
      })
      .catch(err => {
        console.error('Control error:', err);
        alert('Network error sending control');
      });
    }

    // Render hero state
    function renderHeroState(data) {
      const container = document.getElementById('hero-content');
      const state = data.state;

      if (!state.hero_detected) {
        container.innerHTML = `
          <div class="waiting-message">
            <span class="status-indicator offline"></span>
            <p>No hero detected</p>
            <p style="font-size: 0.8em; opacity: 0.7; margin-top: 10px;">
              Waiting for hero seat identification...
            </p>
          </div>
        `;
        return;
      }

      // Status row
      const statusHtml = `
        <div class="status-row">
          <div class="status-card">
            <div class="label">Hero Seat</div>
            <div class="value">SEAT ${state.hero_seat}</div>
          </div>
          <div class="status-card">
            <div class="label">Street</div>
            <div class="value">${state.street.toUpperCase()}</div>
          </div>
          <div class="status-card">
            <div class="label">Status</div>
            <div class="value">
              ${state.seated ? 'SEATED' : 'NOT SEATED'}
              <span class="status-indicator ${state.seated ? 'online' : 'offline'}"></span>
            </div>
          </div>
        </div>
      `;

      // Hero cards
      const heroCardsHtml = state.hero_cards && state.hero_cards.length > 0
        ? `<div class="hero-cards">${state.hero_cards.map(formatCard).join('')}</div>`
        : '<div class="hero-cards"><em>No hole cards</em></div>';

      // Board cards
      const boardCardsHtml = state.board_cards && state.board_cards.length > 0
        ? state.board_cards.map(formatCard).join('')
        : '<span style="opacity: 0.5;">No board cards</span>';

      // Warning message
      const warningHtml = state.waiting_for_big_blind
        ? `<div class="warning-message">⏳ Waiting for Big Blind</div>`
        : '';

      // Action buttons (conditional based on allowed_actions)
      const canAct = state.can_act && state.in_hand;
      const allowedActions = state.allowed_actions || [];
      
      const actionButtons = [
        { action: 'fold', label: 'FOLD', class: 'btn-fold' },
        { action: 'check', label: 'CHECK', class: 'btn-check' },
        { action: 'call', label: 'CALL', class: 'btn-call' },
        { action: 'raise', label: 'RAISE', class: 'btn-raise' }
      ];

      const actionsHtml = actionButtons.map(btn => {
        const isAllowed = allowedActions.includes(btn.action);
        const disabled = !canAct || !isAllowed;
        return `
          <button class="action-btn ${btn.class}" 
                  onclick="sendAction('${btn.action}')"
                  ${disabled ? 'disabled' : ''}>
            ${btn.label}
          </button>
        `;
      }).join('');

      // Control buttons
      const controlsHtml = `
        <div class="control-buttons">
          <button class="btn-control btn-sitout" onclick="sendControl('sit_out')">
            SIT OUT
          </button>
          <button class="btn-control btn-waitbb" onclick="sendControl('wait_for_bb')">
            WAIT FOR BB
          </button>
          <button class="btn-control btn-sitin" onclick="sendControl('sit_in')">
            SIT IN
          </button>
        </div>
      `;

      container.innerHTML = `
        ${statusHtml}
        ${heroCardsHtml}
        <h3 style="margin-top: 20px; margin-bottom: 10px;">Board</h3>
        <div class="board-display">
          ${boardCardsHtml}
        </div>
        ${warningHtml}
        <h3 style="margin-top: 20px; margin-bottom: 10px;">Actions</h3>
        <div class="action-buttons">
          ${actionsHtml}
        </div>
        ${controlsHtml}
      `;
    }

    // Poll for state updates
    function pollState() {
      const startTime = Date.now();
      
      fetch(API_BASE + '/state')
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(data => {
          mockMode = false; // Real API detected
          lastPollTime = Date.now();
          const latency = lastPollTime - startTime;
          document.getElementById('poll-status').textContent = 
            `Last poll: ${latency}ms ago`;
          
          if (data.ok) {
            renderHeroState(data);
          } else {
            console.error('API error:', data.error);
          }
        })
        .catch(err => {
          // API not ready yet - use mock data
          if (mockMode) {
            console.log('Using mock data (Agent 1 API not ready yet)');
            renderHeroState(MOCK_DATA);
            document.getElementById('poll-status').textContent = 
              'MOCK MODE (Agent 1 API pending)';
          } else {
            console.error('Poll error:', err);
            document.getElementById('poll-status').textContent = 
              `Error: ${err.message}`;
          }
        });
    }

    // Calculate equity (ISOLATED from live state)
    function calculateEquity() {
      const input = document.getElementById('equity-input').value;
      const result = document.getElementById('equity-result');
      
      result.innerHTML = '<em>Calculating...</em>';
      
      fetch(API_BASE + '/equity/calculate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scenario: input })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          result.innerHTML = `<pre>${JSON.stringify(data.result, null, 2)}</pre>`;
        } else {
          result.innerHTML = `<span style="color: #f44336;">Error: ${data.error}</span>`;
        }
      })
      .catch(err => {
        result.innerHTML = `<span style="color: #f44336;">Network error: ${err.message}</span>`;
      });
    }

    // Start polling on load
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Starting hero remote control...');
      pollState(); // Initial poll
      pollInterval = setInterval(pollState, 2000); // Poll every 2 seconds
    });
  </script>
</body>
</html>
