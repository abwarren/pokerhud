<!DOCTYPE html>
<html>
<head>
  <title>Equity Calculator</title>
  <style>
    body {
      font-family: monospace;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { color: #00d4aa; }
    textarea {
      width: 100%;
      height: 300px;
      background: #2a2a2a;
      border: 2px solid #00d4aa;
      color: #fff;
      padding: 15px;
      font-family: monospace;
      font-size: 14px;
      border-radius: 5px;
    }
    button {
      background: #00d4aa;
      color: #000;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }
    button:hover { background: #00ffcc; }
    #result {
      margin-top: 20px;
      background: #2a2a2a;
      padding: 20px;
      border-radius: 5px;
      white-space: pre-wrap;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>🎯 Manual Equity Calculator</h1>
  <p>Paste hands (one per line, board last) and click Calculate:</p>
  
  <textarea id="hands" placeholder="Example:
7h4d9h6c
5hTh8hQd
2cTsKd3h
7sQc8s"></textarea>
  
  <button onclick="calculate()">Calculate Equity</button>
  
  <div id="result"></div>
  
  <script>
    async function calculate() {
      const hands = document.getElementById('hands').value.trim();
      const result = document.getElementById('result');
      
      if (!hands) {
        result.textContent = 'Please paste hand data';
        return;
      }
      
      result.textContent = 'Calculating... Please wait...';
      
      try {
        const response = await fetch('/api/equity/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ raw_text: hands })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          result.textContent = data.output;
        } else {
          result.textContent = 'Error: ' + data.error;
        }
      } catch (err) {
        result.textContent = 'Network error: ' + err.message;
      }
    }
  </script>
</body>
</html>
