<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Collector + Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 2em;
      letter-spacing: 2px;
    }

    .nav {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 10px;
    }

    .nav-tab {
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .nav-tab:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .nav-tab.active {
      background: #2196f3;
    }

    .container {
      display: grid;
      grid-template-columns: 20% 80%;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border-radius: 10px;
    }

    .panel h2 {
      margin-bottom: 15px;
      font-size: 1.3em;
      color: #00d4aa;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9em;
      background: #2196f3;
      color: white;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.danger {
      background: #f44336;
    }

    button.success {
      background: #4caf50;
    }

    select {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9em;
    }

    .status {
      font-size: 0.85em;
      color: #9fbc9f;
      margin-left: auto;
    }

    .hands-display, .engine-output {
      width: 100%;
      background: #050805;
      color: #d6e8d6;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #223322;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
    }

    .engine-output {
      background: #0a0a0a;
      border-color: #333;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .results-table th {
      background: rgba(0, 212, 170, 0.2);
      padding: 10px;
      text-align: left;
      border-bottom: 2px solid #00d4aa;
      font-size: 0.9em;
    }

    .results-table td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.85em;
    }

    .results-table tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .hand-cell {
      font-family: monospace;
      letter-spacing: 0.5px;
    }

    .eq-positive {
      color: #4caf50;
      font-weight: bold;
    }

    .eq-negative {
      color: #f44336;
      font-weight: bold;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.5;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HAND COLLECTOR + ENGINE</h1>
  </div>

  <div class="nav">
    <a href="https://test.potlimitomaha.xyz:8080" class="nav-tab">REMOTE CONTROL</a>
    <a href="/wiki.html" class="nav-tab">WIKI</a>
    <span class="nav-tab active">HAND COLLECTOR</span>
    <a href="https://equity.potlimitomaha.xyz:8080" class="nav-tab">EQUITY ENGINE</a>
  </div>

  <div class="container">
    <!-- Left Panel: Collected Hands -->
    <div class="panel">
      <h2>Collected Hands</h2>
      <div class="controls">
        <button onclick="loadHands()">Refresh</button>
        <button class="danger" onclick="clearHands()">Clear</button>
        <button class="success" onclick="sendToEngine()">Send to Engine</button>
        <span class="status" id="hands-status">Ready</span>
      </div>
      <textarea class="hands-display" id="hands-display" placeholder="Paste hands here or click Refresh..."></textarea>
    </div>

    <!-- Right Panel: Engine Results -->
    <div class="panel">
      <h2>Engine Analysis</h2>
      <div class="controls">
        <select id="variant-select">
          <option value="plo4-6max">PLO4 6-max</option>
          <option value="plo5-6max" selected>PLO5 6-max</option>
          <option value="plo5-hu">PLO5 Heads-Up</option>
          <option value="plo6-6max">PLO6 6-max</option>
          <option value="plo7-6max">PLO7 6-max</option>
        </select>
        <button id="run-btn" class="success" onclick="runEngine()">Run Engine</button>
        <span class="status" id="engine-status"></span>
      </div>
      <textarea class="engine-output" id="engine-output" placeholder="Engine results will appear here..." readonly></textarea>
      <div id="results-container"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    const COLLECTOR_BASE = '/collector';
    let currentHands = '';
    let eventSource = null;

    // Load hands from collector
    async function loadHands() {
      const statusEl = document.getElementById('hands-status');
      const displayEl = document.getElementById('hands-display');

      try {
        const response = await fetch(COLLECTOR_BASE + '/ascii-all');
        const text = await response.text();
        currentHands = text.trim();

        if (currentHands) {
          displayEl.value = currentHands;
        }

        statusEl.textContent = 'Updated: ' + new Date().toLocaleTimeString();
      } catch (error) {
        console.error('Load hands error:', error);
        statusEl.textContent = 'Load failed';
      }
    }

    // Send hands from collected panel to engine input
    function sendToEngine() {
      const displayEl = document.getElementById('hands-display');
      currentHands = displayEl.value.trim();

      if (currentHands) {
        const statusEl = document.getElementById('hands-status');
        statusEl.textContent = 'Sent to engine';
        setTimeout(() => statusEl.textContent = 'Ready', 2000);
      }
    }

    // Clear all hands
    async function clearHands() {
      try {
        await fetch(COLLECTOR_BASE + '/clear', { method: 'POST' });
        await loadHands();
      } catch (error) {
        console.error('Clear hands error:', error);
      }
    }


    // Run equity engine
    async function runEngine() {
      const displayEl = document.getElementById('hands-display');
      currentHands = displayEl.value.trim();

      if (!currentHands) {
        alert('Please enter hands to analyze');
        return;
      }

      const outputEl = document.getElementById('engine-output');
      const statusEl = document.getElementById('engine-status');
      const runBtn = document.getElementById('run-btn');
      const resultsContainer = document.getElementById('results-container');

      // Clear previous results
      outputEl.value = '';
      resultsContainer.innerHTML = '';
      runBtn.disabled = true;
      statusEl.textContent = 'Starting engine...';

      // Close existing event source
      if (eventSource) {
        eventSource.close();
      }

      try {
        // Submit job
        const variant = document.getElementById('variant-select').value;
        const response = await fetch(API_BASE + '/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            variant: variant,
            hands: currentHands
          })
        });

        const data = await response.json();

        if (!data.ok || !data.job_id) {
          throw new Error(data.error || 'Failed to start engine');
        }

        const jobId = data.job_id;
        statusEl.textContent = `Running job ${jobId}...`;

        // Stream output via SSE
        eventSource = new EventSource(API_BASE + `/stream/${jobId}`);

        eventSource.onmessage = (event) => {
          const line = event.data;
          outputEl.value += line + '\n';
          outputEl.scrollTop = outputEl.scrollHeight;
        };

        eventSource.addEventListener('done', async () => {
          eventSource.close();
          statusEl.textContent = 'Engine complete. Loading results...';

          // Fetch structured results
          try {
            const resultsResponse = await fetch(API_BASE + `/results/${jobId}`);
            const resultsData = await resultsResponse.json();

            if (resultsData.ok && resultsData.results) {
              displayResults(resultsData.results);
              statusEl.textContent = 'Complete';
            } else {
              statusEl.textContent = 'Results not available';
            }
          } catch (error) {
            console.error('Results fetch error:', error);
            statusEl.textContent = 'Failed to load results';
          }

          runBtn.disabled = false;
        });

        eventSource.addEventListener('error', (error) => {
          console.error('SSE error:', error);
          eventSource.close();
          statusEl.textContent = 'Stream error';
          runBtn.disabled = false;
        });

      } catch (error) {
        console.error('Run engine error:', error);
        outputEl.value = 'Error: ' + error.message;
        statusEl.textContent = 'Failed';
        runBtn.disabled = false;
      }
    }

    // Display results table
    function displayResults(results) {
      const container = document.getElementById('results-container');

      if (!results.matchups || results.matchups.length === 0) {
        container.innerHTML = '<div class="empty-state">No matchups found</div>';
        return;
      }

      // Sort by disparity (negative = best EV)
      const sorted = [...results.matchups].sort((a, b) => a.disparity - b.disparity);

      let html = '<table class="results-table"><thead><tr>';
      html += '<th>Rank</th>';
      html += '<th>Hand 1</th>';
      html += '<th>Hand 2</th>';
      html += '<th>EQ1</th>';
      html += '<th>EQ2</th>';
      html += '<th>Disparity</th>';
      html += '<th>Samples</th>';
      html += '</tr></thead><tbody>';

      sorted.forEach((matchup, idx) => {
        const disparityClass = matchup.disparity < 0 ? 'eq-positive' : 'eq-negative';
        html += '<tr>';
        html += `<td>${idx + 1}</td>`;
        html += `<td class="hand-cell">${matchup.hand1}</td>`;
        html += `<td class="hand-cell">${matchup.hand2}</td>`;
        html += `<td>${(matchup.eq1 * 100).toFixed(2)}%</td>`;
        html += `<td>${(matchup.eq2 * 100).toFixed(2)}%</td>`;
        html += `<td class="${disparityClass}">${matchup.disparity.toFixed(4)}</td>`;
        html += `<td>${matchup.samples || 'N/A'}</td>`;
        html += '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // Load hands on page load (no auto-refresh)
    loadHands();
  </script>
</body>
</html>
