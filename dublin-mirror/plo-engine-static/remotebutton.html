<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>W4P Remote Button Control</title>
  <style>
    :root {
      --color-primary: #4caf50;
      --color-warning: #ffc107;
      --color-danger: #f44336;
      --color-info: #2196f3;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 20px;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-xl: 10px;
      --transition-fast: 0.15s;
      --transition-normal: 0.2s;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 8px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 16px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #fff;
      min-height: 100vh;
      padding: 12px;
    }

    /* ===== HEADER ===== */
    .header {
      background: rgba(0,0,0,0.4);
      padding: 12px 20px;
      border-radius: var(--radius-xl);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #30363d;
    }
    .header h1 { font-size: 1.4em; letter-spacing: 2px; }
    .connection-status {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-md);
      font-size: 0.85em;
      background: rgba(0,0,0,0.3);
    }
    .status-indicator {
      width: 12px; height: 12px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .status-indicator.connected { background: var(--color-primary); }
    .status-indicator.connecting { background: var(--color-warning); }
    .status-indicator.disconnected { background: var(--color-danger); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ===== GREEN FELT TABLE ===== */
    .table-container {
      background: radial-gradient(ellipse at center, #1a5c2a 0%, #0e3a18 60%, #072a0e 100%);
      border: 4px solid #8b6914;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.6);
    }
    .table-info {
      text-align: center;
      margin-bottom: 16px;
    }
    .street-display {
      background: rgba(255,255,255,0.15);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-md);
      display: inline-block;
      font-weight: 600;
    }
    .pot-display {
      font-size: 1.5em;
      font-weight: bold;
      color: var(--color-warning);
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      margin-top: 4px;
    }

    /* ===== BOARD CARDS ===== */
    .board-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      padding: var(--spacing-md);
      background: rgba(0,0,0,0.2);
      border-radius: var(--radius-xl);
    }
    .card {
      color: #fff;
      padding: 14px 10px;
      border-radius: var(--radius-lg);
      font-weight: bold;
      font-size: 1.2em;
      min-width: 50px;
      text-align: center;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform var(--transition-fast);
    }
    .card:hover { transform: scale(1.05); }
    .card.red { background: linear-gradient(135deg,#ff0000,#cc0000); }
    .card.blue { background: linear-gradient(135deg,#0066ff,#0052cc); }
    .card.green { background: linear-gradient(135deg,#00aa00,#008800); }
    .card.black { background: linear-gradient(135deg,#333,#000); }

    /* ===== SEATS GRID ===== */
    .seats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 1800px;
      margin: 0 auto;
    }
    @media (max-width: 1200px) { .seats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .seats-grid { grid-template-columns: 1fr; } }

    /* ===== BET CHIP INDICATOR (above seat) ===== */
    .bet-indicator {
      text-align: center;
      margin-bottom: 4px;
      min-height: 28px;
      transition: all 0.3s;
    }
    .bet-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.5);
      border: 2px solid #ffd700;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8em;
      font-weight: bold;
      color: #ffd700;
      animation: chipDrop 0.3s ease-out;
      box-shadow: 0 2px 8px rgba(255,215,0,0.4);
    }
    .chip-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
      border: 2px solid #fff;
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.4);
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes chipDrop {
      from { transform: translateY(-12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ===== SEAT CARD ===== */
    .seat-card {
      background: rgba(0,0,0,0.45);
      border-radius: var(--radius-lg);
      padding: var(--spacing-sm);
      border: 3px solid transparent;
      transition: all 0.3s;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(4px);
    }
    .seat-card.connected {
      border-color: var(--color-primary);
      box-shadow: 0 0 8px rgba(76,175,80,0.3);
    }
    .seat-card.empty { opacity: 0.45; filter: grayscale(30%); }
    .seat-card.stale {
      border-color: #ff5722; opacity: 0.7;
      background: rgba(255,87,34,0.1);
    }
    .seat-card.action-on {
      border-color: var(--color-warning);
      animation: blink-border 1s infinite;
    }
    @keyframes blink-border {
      0%,100% { border-color: var(--color-warning); box-shadow: 0 0 20px var(--color-warning); }
      50% { border-color: #ff5722; box-shadow: 0 0 40px #ff5722; }
    }

    .seat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .seat-title { font-size: 0.85em; font-weight: bold; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 4px; }
    .status-dot.live { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-dot.offline { background: #666; }
    .dealer-marker {
      background: #ffc107; color: #000;
      padding: 2px 6px; border-radius: 3px;
      font-size: 0.65em; font-weight: bold;
    }
    .seat-info { margin-bottom: 6px; font-size: 0.75em; line-height: 1.3; }

    /* ===== HOLE CARDS ===== */
    .hole-cards { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
    .hole-card {
      color: #fff;
      padding: var(--spacing-xs) 3px;
      border-radius: var(--radius-sm);
      font-weight: bold;
      font-size: 0.65em;
      min-width: 24px;
      text-align: center;
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .hole-card.red { background: linear-gradient(135deg,#ff0000,#cc0000); }
    .hole-card.blue { background: linear-gradient(135deg,#0066ff,#0052cc); }
    .hole-card.green { background: linear-gradient(135deg,#00aa00,#008800); }
    .hole-card.black { background: linear-gradient(135deg,#333,#000); }

    /* ===== POKERBET-STYLE BUTTON GRID ===== */
    .btn-row {
      list-style: none;
      padding: 0; margin: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      margin-top: 6px;
    }

    .action-btn-poker {
      width: 100%;
      padding: 10px 6px;
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      font-weight: 800;
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: 0.7em;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.3);
    }
    .action-btn-poker:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.15); }
    .action-btn-poker:active:not(:disabled) { transform: translateY(2px); box-shadow: var(--shadow-sm), inset 0 1px 2px rgba(0,0,0,0.3); }
    .action-btn-poker:disabled { opacity: 0.35; cursor: not-allowed; filter: grayscale(50%); }

    /* Button colors - 3D gradient style */
    .action-btn-poker.fold { background: linear-gradient(180deg,#e53935,#c62828); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .action-btn-poker.fold:hover:not(:disabled) { background: linear-gradient(180deg,#ef5350,#d32f2f); }

    .action-btn-poker.check-call { background: linear-gradient(180deg,#43a047,#2e7d32); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .action-btn-poker.check-call:hover:not(:disabled) { background: linear-gradient(180deg,#66bb6a,#388e3c); }

    .action-btn-poker.raise { background: linear-gradient(180deg,#ff8a65,#ff5722); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .action-btn-poker.raise:hover:not(:disabled) { background: linear-gradient(180deg,#ffab91,#ff6f00); }

    .action-btn-poker.min { background: linear-gradient(180deg,#607d8b,#455a64); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .action-btn-poker.min:hover:not(:disabled) { background: linear-gradient(180deg,#78909c,#546e7a); }

    .action-btn-poker.max { background: linear-gradient(180deg,#ffd54f,#fbc02d); color: #000; text-shadow: 0 1px 0 rgba(255,255,255,0.5); font-weight: 900; }
    .action-btn-poker.max:hover:not(:disabled) { background: linear-gradient(180deg,#ffeb3b,#fdd835); }

    .action-btn-poker.bet { background: linear-gradient(180deg,#ff8a50,#e65100); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .action-btn-poker.bet:hover:not(:disabled) { background: linear-gradient(180deg,#ff9e80,#f4511e); }

    .action-btn-poker.allin {
      background: linear-gradient(180deg,#d32f2f,#b71c1c); color: #fff; font-weight: 900;
      text-shadow: 0 1px 2px rgba(0,0,0,0.7);
      animation: pulse-allin 2s infinite;
    }
    @keyframes pulse-allin {
      0%,100% { box-shadow: 0 4px 8px rgba(0,0,0,0.3), 0 0 15px rgba(211,47,47,0.5); }
      50% { box-shadow: 0 4px 8px rgba(0,0,0,0.3), 0 0 25px rgba(211,47,47,0.8); }
    }
    .action-btn-poker.allin:hover:not(:disabled) { background: linear-gradient(180deg,#e53935,#c62828); }

    .action-btn-poker.cashout {
      background: linear-gradient(180deg,#c62828,#b71c1c); color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.2);
    }
    .action-btn-poker.cashout:hover:not(:disabled) { background: linear-gradient(180deg,#d32f2f,#c62828); }

    /* ===== PRESELECTED STATE (Orange) ===== */
    .action-btn-poker.preselected {
      border-color: #ff6f00;
      animation: pulse-preselect 2s infinite;
    }
    @keyframes pulse-preselect {
      0%,100% { box-shadow: 0 0 12px rgba(255,111,0,0.6); }
      50% { box-shadow: 0 0 20px rgba(255,111,0,0.9); }
    }

    /* ===== AVAILABLE STATE (Green glow) ===== */
    .action-btn-poker.available {
      border-color: #00e676;
      animation: pulse-available 1.5s infinite;
    }
    @keyframes pulse-available {
      0%,100% { box-shadow: 0 0 16px rgba(0,230,118,0.8); }
      50% { box-shadow: 0 0 24px rgba(0,230,118,1); }
    }

    /* ===== BOTH PRESELECTED + AVAILABLE ===== */
    .action-btn-poker.preselected.available {
      border-color: #00e676;
      box-shadow: 0 0 20px rgba(0,230,118,1), 0 0 12px rgba(255,111,0,0.6);
      animation: pulse-combo 1.5s infinite;
    }
    @keyframes pulse-combo { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }

    /* ===== BET SLIDER SECTION ===== */
    .bet-slider-section {
      margin: var(--spacing-sm) 0;
      padding: var(--spacing-sm);
      background: rgba(255,152,0,0.1);
      border: 1px solid rgba(255,152,0,0.3);
      border-radius: var(--radius-md);
    }
    .bet-slider-label {
      font-size: 0.65em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #ffb74d;
      margin-bottom: var(--spacing-sm);
      font-weight: bold;
      display: block;
    }
    .bet-slider-controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .bet-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      border-radius: var(--radius-sm);
      background: linear-gradient(90deg,#ff5722,#ff9800 50%,#ffc107);
      outline: none;
      cursor: pointer;
    }
    .bet-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg,#fff,#f0f0f0);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      border: 3px solid #ff5722;
    }
    .bet-slider::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg,#fff,#f0f0f0);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      border: 3px solid #ff5722;
    }
    .bet-input {
      width: 70px;
      padding: var(--spacing-xs) var(--spacing-sm);
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,152,0,0.5);
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 0.75em;
      text-align: center;
      font-weight: bold;
    }
    .bet-input:focus {
      outline: none;
      border-color: #ff9800;
      box-shadow: 0 0 8px rgba(255,152,0,0.6);
    }

    /* ===== PRE-ACTION CHECKBOXES ===== */
    .pre-actions {
      margin: var(--spacing-sm) 0 0 0;
      padding: var(--spacing-xs);
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-sm);
      font-size: 0.65em;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .pre-action-item {
      display: flex;
      align-items: center;
      margin: var(--spacing-xs) 0;
      padding: var(--spacing-xs);
      border-radius: var(--radius-sm);
    }
    .pre-action-item input[type="checkbox"] {
      width: 14px; height: 14px;
      margin-right: var(--spacing-xs);
      cursor: pointer;
      accent-color: var(--color-primary);
    }
    .pre-action-item label { cursor: pointer; font-size: 0.9em; user-select: none; }

    /* ===== COMMAND LOG ===== */
    .command-log {
      background: rgba(0,0,0,0.4);
      border: 1px solid #30363d;
      padding: 16px;
      border-radius: var(--radius-xl);
      max-height: 200px;
      overflow-y: auto;
    }
    .command-log h3 { margin-bottom: 10px; font-size: 0.9em; }
    .log-entry {
      padding: 6px 8px;
      margin: 4px 0;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-sm);
      font-size: 0.8em;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>W4P // REMOTE BUTTON CONTROL</h1>
      <div class="connection-status">
        <div class="status-indicator connecting" id="status-dot"></div>
        <span id="status-text">Connecting...</span>
        <span id="status-details" style="font-size:0.8em;opacity:0.7;margin-left:6px;"></span>
      </div>
    </div>
  </div>

  <div id="app"></div>

  <div class="command-log">
    <h3>Command Log</h3>
    <div id="log-container"></div>
  </div>

  <script>
    // ========== CONFIG ==========
    const API_BASE = '/api';
    const STALENESS_SECONDS = 30;
    const FAST_POLL = 1500;
    const SLOW_POLL = 5000;
    const IDLE_THRESHOLD = 30000;
    const FETCH_TIMEOUT = 10000;

    // ========== STATE ==========
    let commandLog = [];
    let currentPollInterval = FAST_POLL;
    let lastActivityTime = Date.now();
    let pollTimer = null;
    let lastSnapshotHash = null;
    let consecutiveFailures = 0;
    let currentTableData = null;
    let buttonStates = {};     // "tableId:seatNo:type" -> {preselected, available}
    let seatBets = {};         // seatNo -> {amount, ts}  for chip display

    // ========== CONNECTION STATUS ==========
    let lastSuccessfulPoll = null;

    function updateConnectionStatus(state, details) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const det = document.getElementById('status-details');
      if (!dot) return;
      dot.className = 'status-indicator ' + state;
      if (state === 'connected') {
        text.textContent = 'Connected';
        lastSuccessfulPoll = new Date();
        det.textContent = details || 'Live';
      } else if (state === 'connecting') {
        text.textContent = 'Connecting...';
        det.textContent = details || '';
      } else {
        text.textContent = 'Disconnected';
        det.textContent = details || 'Reconnecting...';
      }
    }

    setInterval(() => {
      if (lastSuccessfulPoll) {
        const sec = Math.floor((new Date() - lastSuccessfulPoll) / 1000);
        const el = document.getElementById('status-details');
        if (sec < 120 && el) el.textContent = sec + 's ago';
      }
    }, 5000);

    // ========== CARD FORMATTING ==========
    function formatCard(card) {
      if (!card) return '';
      const suit = card.slice(-1);
      const rank = card.slice(0, -1).toUpperCase();
      const col = { h:'red', d:'blue', c:'green', s:'black' }[suit] || '';
      const sym = { h:'\u2665', d:'\u2666', c:'\u2663', s:'\u2660' }[suit] || suit;
      return '<span class="card ' + col + '">' + rank + sym + '</span>';
    }

    function formatHoleCard(card) {
      if (!card) return '';
      const suit = card.slice(-1);
      const rank = card.slice(0, -1).toUpperCase();
      const col = { h:'red', d:'blue', c:'green', s:'black' }[suit] || '';
      const sym = { h:'\u2665', d:'\u2666', c:'\u2663', s:'\u2660' }[suit] || suit;
      return '<span class="hole-card ' + col + '">' + rank + sym + '</span>';
    }

    // ========== BET SLIDER SYNC ==========
    function updateBetInput(seatNo, value) {
      const input = document.getElementById('betinput-' + seatNo);
      if (input) input.value = Math.round(value);
    }

    function updateBetSlider(seatNo, value) {
      const slider = document.getElementById('slider-' + seatNo);
      if (slider) slider.value = value;
    }

    function getBetAmount(seatIndex) {
      const input = document.getElementById('betinput-' + seatIndex);
      return input ? parseFloat(input.value) : undefined;
    }

    // ========== BUTTON PRESELECT & COMMANDS ==========
    function togglePreselect(tableId, seatIndex, buttonType) {
      const key = tableId + ':' + seatIndex + ':' + buttonType;
      if (!buttonStates[key]) buttonStates[key] = { preselected: false, available: false };
      buttonStates[key].preselected = !buttonStates[key].preselected;

      if (buttonStates[key].preselected) {
        const amount = (buttonType === 'raise' || buttonType === 'bet')
          ? getBetAmount(seatIndex)
          : undefined;
        sendCommand(tableId, seatIndex, buttonType, amount);
      }

      renderTable(currentTableData);
    }

    function sendCommand(tableId, seatIndex, commandType, amount) {
      const body = {
        table_id: tableId,
        seat_index: seatIndex,
        command_type: commandType
      };
      if (amount !== undefined) body.amount = amount;

      fetch(API_BASE + '/commands/queue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          const label = amount ? commandType + '(' + amount + ')' : commandType;
          addToLog(seatIndex, label, 'PENDING');
          recordActivity();

          // Show bet chip for bet/raise/call/allin commands
          if (['bet', 'raise', 'call', 'allin'].includes(commandType)) {
            seatBets[seatIndex] = { amount: amount || commandType.toUpperCase(), ts: Date.now() };
            renderTable(currentTableData);
          }
        } else {
          addToLog(seatIndex, commandType, 'FAILED');
          console.error('Command failed:', data.error);
        }
      })
      .catch(err => {
        addToLog(seatIndex, commandType, 'ERROR');
        console.error('Network error:', err);
      });
    }

    // ========== COMMAND LOG ==========
    function addToLog(seatIndex, command, status) {
      const ts = new Date().toLocaleTimeString();
      commandLog.unshift({ ts, seat: seatIndex, command, status });
      commandLog = commandLog.slice(0, 20);
      updateLog();
    }

    function updateLog() {
      const c = document.getElementById('log-container');
      if (!c) return;
      c.innerHTML = commandLog.map(e =>
        '<div class="log-entry"><span>' + e.ts + ' | Seat ' + e.seat + ' | ' + e.command + '</span><span>' + e.status + '</span></div>'
      ).join('');
    }

    // ========== SEAT STATE ==========
    function getSeatState(seat) {
      const occupied = !!seat.name;
      const active = seat.status === 'playing';
      const pending = !!seat.pending_cmd;
      const stale = seat.last_seen_ago !== null && seat.last_seen_ago > STALENESS_SECONDS;
      return {
        seatNo: seat.seat_index,
        name: seat.name,
        stack: seat.stack_zar || 0,
        occupied, active, pending, stale
      };
    }

    // ========== RENDER ==========
    function renderTable(table) {
      if (!table) return;
      currentTableData = table;
      const app = document.getElementById('app');

      const board = table.board;
      const boardCards = [...board.flop, board.turn, board.river].filter(c => c);
      const boardHtml = boardCards.length > 0
        ? boardCards.map(formatCard).join('')
        : '<span style="opacity:0.5;">Waiting for flop...</span>';

      const seatsHtml = table.seats.map(seat => {
        const st = getSeatState(seat);
        const canAct = st.occupied && st.active && !st.stale;

        const holeCardsHtml = seat.hole_cards && seat.hole_cards.length > 0
          ? '<div class="hole-cards">' + seat.hole_cards.map(formatHoleCard).join('') + '</div>'
          : '';

        const liveClass = st.occupied ? 'live' : 'offline';
        let cardClass = '';
        if (!st.occupied) cardClass = 'empty';
        else if (st.stale) cardClass = 'stale';
        else if (st.active) cardClass = 'connected action-on';
        else cardClass = 'connected';

        const pendingHtml = st.pending
          ? '<div style="color:#ff9800;font-size:0.7em;margin-top:4px;">\u23F3 ' + seat.pending_cmd + '</div>'
          : '';

        let statusText = 'EMPTY';
        if (st.occupied) {
          if (st.stale) statusText = 'DISCONNECTED';
          else if (st.pending) statusText = 'PENDING';
          else if (st.active) statusText = 'ACTIVE';
          else statusText = 'OCCUPIED';
        }

        const tid = table.table_id;
        const sno = st.seatNo;

        function mkBtn(type, label, cssClass, disabled) {
          const key = tid + ':' + sno + ':' + type;
          const bs = buttonStates[key] || { preselected: false, available: false };
          bs.available = !disabled;
          buttonStates[key] = bs;
          let cls = 'action-btn-poker ' + cssClass;
          if (bs.preselected) cls += ' preselected';
          if (bs.available) cls += ' available';
          return '<button class="' + cls + '" ' + (disabled ? 'disabled' : '') +
            ' onclick="togglePreselect(\'' + tid + '\',' + sno + ',\'' + type + '\')">' + label + '</button>';
        }

        // Bet chip indicator
        const betInfo = seatBets[sno];
        let chipHtml = '';
        if (betInfo && (Date.now() - betInfo.ts) < 15000) {
          const amt = typeof betInfo.amount === 'number' ? 'ZAR ' + betInfo.amount.toFixed(2) : betInfo.amount;
          chipHtml = '<div class="bet-chip"><span class="chip-icon"></span>' + amt + '</div>';
        }

        return '<div class="bet-indicator">' + chipHtml + '</div>' +
          '<div class="seat-card ' + cardClass + '">' +
            '<div class="seat-header">' +
              '<div>' +
                '<span class="seat-title">SEAT ' + sno + '</span>' +
                '<span class="status-dot ' + liveClass + '"></span>' +
              '</div>' +
              (seat.is_dealer ? '<span class="dealer-marker">DEALER</span>' : '') +
            '</div>' +
            '<div class="seat-info">' +
              '<div><strong>' + (st.name || 'Empty') + '</strong></div>' +
              '<div>ZAR ' + st.stack.toFixed(2) + '</div>' +
              '<div>Status: ' + statusText + '</div>' +
              holeCardsHtml +
              pendingHtml +
            '</div>' +

            // Row 1: FOLD | CHECK | CALL
            '<ul class="btn-row">' +
              '<li>' + mkBtn('fold', 'FOLD', 'fold', !canAct) + '</li>' +
              '<li>' + mkBtn('check', 'CHECK', 'check-call', !canAct) + '</li>' +
              '<li>' + mkBtn('call', 'CALL', 'check-call', !canAct) + '</li>' +
            '</ul>' +

            // Bet slider section: MIN | slider | input | MAX
            '<div class="bet-slider-section">' +
              '<label class="bet-slider-label">BET SIZE</label>' +
              '<div class="bet-slider-controls">' +
                mkBtn('min', 'MIN', 'min', !canAct) +
                '<input type="range" class="bet-slider" id="slider-' + sno + '"' +
                  ' min="0" max="' + Math.max(st.stack, 100) + '"' +
                  ' value="' + (Math.min(st.stack * 0.5, st.stack) || 50) + '"' +
                  (st.occupied ? '' : ' disabled') +
                  ' oninput="updateBetInput(' + sno + ',this.value)">' +
                '<input type="number" class="bet-input" id="betinput-' + sno + '"' +
                  ' min="0" max="' + Math.max(st.stack, 100) + '"' +
                  ' value="' + (Math.min(st.stack * 0.5, st.stack).toFixed(0) || 50) + '"' +
                  (st.occupied ? '' : ' disabled') +
                  ' oninput="updateBetSlider(' + sno + ',this.value)">' +
                mkBtn('max', 'MAX', 'max', !canAct) +
              '</div>' +
            '</div>' +

            // Row 2: BET | ALL-IN | CASHOUT
            '<ul class="btn-row">' +
              '<li>' + mkBtn('bet', 'BET', 'bet', !canAct) + '</li>' +
              '<li>' + mkBtn('allin', 'ALL-IN', 'allin', !canAct) + '</li>' +
              '<li>' + mkBtn('cashout', 'CASHOUT', 'cashout', !st.occupied) + '</li>' +
            '</ul>' +

            // Pre-actions
            '<div class="pre-actions">' +
              '<div class="pre-action-item">' +
                '<input type="checkbox" id="cf-' + sno + '"' +
                  ' onchange="if(this.checked){document.getElementById(\'cc-' + sno + '\').checked=false;sendCommand(\'' + tid + '\',' + sno + ',\'check_fold\')}else{sendCommand(\'' + tid + '\',' + sno + ',\'clear\')}">' +
                '<label for="cf-' + sno + '">Check/Fold</label>' +
              '</div>' +
              '<div class="pre-action-item">' +
                '<input type="checkbox" id="cc-' + sno + '"' +
                  ' onchange="if(this.checked){document.getElementById(\'cf-' + sno + '\').checked=false;sendCommand(\'' + tid + '\',' + sno + ',\'check_call\')}else{sendCommand(\'' + tid + '\',' + sno + ',\'clear\')}">' +
                '<label for="cc-' + sno + '">Check/Call</label>' +
              '</div>' +
            '</div>' +
          '</div>';
      }).join('');

      app.innerHTML =
        '<div class="table-container">' +
          '<div class="table-info">' +
            '<div class="street-display">' + table.street + '</div>' +
            '<div class="pot-display">POT: ZAR ' + (table.pot_zar ? table.pot_zar.toFixed(2) : '0.00') + '</div>' +
          '</div>' +
          '<div class="board-display">' + boardHtml + '</div>' +
          '<div class="seats-grid">' + seatsHtml + '</div>' +
        '</div>';
    }

    function showWaiting() {
      const emptyTable = {
        table_id: 'waiting',
        variant: 'plo',
        street: 'WAITING',
        pot_zar: 0,
        dealer_seat: null,
        board: { flop: [], turn: null, river: null },
        seats: Array.from({ length: 9 }, (_, i) => ({
          seat_index: i,
          name: null,
          stack_zar: 0,
          hole_cards: [],
          status: 'empty',
          is_dealer: false,
          last_seen_ago: null,
          pending_cmd: null
        }))
      };
      renderTable(emptyTable);
    }

    // ========== POLLING ==========
    function recordActivity() {
      lastActivityTime = Date.now();
      consecutiveFailures = 0;
      if (currentPollInterval === SLOW_POLL) {
        currentPollInterval = FAST_POLL;
      }
    }

    async function fetchWithTimeout(url, opts, timeout) {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), timeout || FETCH_TIMEOUT);
      try {
        const r = await fetch(url, { ...opts, signal: ctrl.signal });
        clearTimeout(tid);
        return r;
      } catch (e) {
        clearTimeout(tid);
        throw e;
      }
    }

    async function pollTable() {
      try {
        const res = await fetchWithTimeout(API_BASE + '/table/latest');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        if (!data.ok || !data.table) {
          consecutiveFailures++;
          updateConnectionStatus('connecting');
          showWaiting();
          return;
        }

        const table = data.table;
        const snap = Object.assign({}, table);
        delete snap.last_updated;
        delete snap.state_version;
        (snap.seats || []).forEach(s => { delete s.last_seen; delete s.last_seen_ago; });
        const hash = JSON.stringify(snap);

        if (hash === lastSnapshotHash) return;

        recordActivity();
        lastSnapshotHash = hash;
        updateConnectionStatus('connected', 'Live');
        renderTable(table);

      } catch (err) {
        consecutiveFailures++;
        if (consecutiveFailures > 3) updateConnectionStatus('disconnected', 'Errors: ' + consecutiveFailures);
        else updateConnectionStatus('connecting');
        showWaiting();
      }
    }

    function scheduleNextPoll() {
      if (pollTimer) clearTimeout(pollTimer);
      if (!navigator.onLine || document.hidden) return;

      if (Date.now() - lastActivityTime > IDLE_THRESHOLD && currentPollInterval === FAST_POLL) {
        currentPollInterval = SLOW_POLL;
      }

      const backoff = consecutiveFailures > 0
        ? Math.min(currentPollInterval * Math.pow(2, consecutiveFailures - 1), 30000)
        : currentPollInterval;

      pollTimer = setTimeout(async () => {
        await pollTable();
        scheduleNextPoll();
      }, backoff);
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && !pollTimer) scheduleNextPoll();
      else if (document.hidden && pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
    });

    // ========== INIT ==========
    showWaiting();
    scheduleNextPoll();
  </script>
</body>
</html>
