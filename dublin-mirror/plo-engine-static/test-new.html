<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N4P Remote Table Control</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 2em;
      letter-spacing: 2px;
    }

    .test-badge {
      background: #ff6b35;
      padding: 8px 16px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.9em;
    }

    .table-container {
      background: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .table-info {
      text-align: center;
      margin-bottom: 20px;
    }

    .board-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .card {
      background: white;
      color: #000;
      padding: 15px 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.2em;
      min-width: 50px;
      text-align: center;
      border: 2px solid #ff1493;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .card.red {
      color: #d32f2f;
    }

    .card.blue {
      color: #2196f3;
    }

    .card.green {
      color: #4caf50;
    }

    .card.black {
      color: #000;
    }

    .seats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .seat-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 20px;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .seat-card.connected {
      border-color: #4caf50;
    }

    .seat-card.empty {
      opacity: 0.5;
    }

    .seat-card.action-on {
      border-color: #ffc107;
      box-shadow: 0 0 20px #ffc107;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 20px #ffc107;
      }
      50% {
        box-shadow: 0 0 30px #ffc107, 0 0 40px #ffc107;
      }
    }

    .seat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .seat-title {
      font-size: 1.2em;
      font-weight: bold;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 8px;
    }

    .status-dot.live {
      background: #4caf50;
      box-shadow: 0 0 10px #4caf50;
    }

    .status-dot.offline {
      background: #666;
    }

    .dealer-marker {
      background: #ffc107;
      color: #000;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.8em;
      font-weight: bold;
    }

    .seat-info {
      margin-bottom: 15px;
    }

    .seat-info div {
      margin: 5px 0;
    }

    .hole-cards {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .hole-card {
      background: white;
      color: #000;
      padding: 8px 6px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.9em;
      min-width: 35px;
      text-align: center;
      border: 2px solid #ff1493;
    }

    .hole-card.red {
      color: #d32f2f;
    }

    .hole-card.blue {
      color: #2196f3;
    }

    .hole-card.green {
      color: #4caf50;
    }

    .hole-card.black {
      color: #000;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 15px;
    }

    .action-btn {
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9em;
    }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-fold {
      background: #f44336;
      color: white;
    }

    .btn-check {
      background: #4caf50;
      color: white;
    }

    .btn-call {
      background: #2196f3;
      color: white;
    }

    .btn-raise {
      background: #ff6b35;
      color: white;
    }

    .btn-cashout {
      background: #00c853;
      color: white;
      grid-column: span 2;
    }

    .checkbox-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 5px;
      margin-top: 10px;
      font-size: 0.85em;
    }

    .checkbox-option input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .checkbox-option label {
      cursor: pointer;
      user-select: none;
    }

    .pending-badge {
      background: #ff6b35;
      color: white;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 0.8em;
      display: inline-block;
      margin-top: 10px;
    }

    .command-log {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border-radius: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .command-log h3 {
      margin-bottom: 15px;
    }

    .log-entry {
      padding: 8px;
      margin: 5px 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      font-size: 0.9em;
      display: flex;
      justify-content: space-between;
    }

    .waiting-message {
      text-align: center;
      font-size: 1.2em;
      opacity: 0.7;
    }

    .pot-display {
      font-size: 1.5em;
      font-weight: bold;
      color: #ffc107;
    }

    .street-display {
      background: rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 5px;
      display: inline-block;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 10px;
    }

    .tab-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1em;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .tab-btn.active {
      background: #2196f3;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>N4P // REMOTE TABLE CONTROL</h1>
    </div>
    <div class="test-badge">TEST</div>
  </div>

  <div class="tabs" style="margin-bottom: 10px;">
    <a href="/" class="tab-btn active" style="text-decoration: none;">REMOTE CONTROL</a>
    <a href="https://collector.potlimitomaha.xyz:8080" class="tab-btn" style="text-decoration: none;">HAND COLLECTOR</a>
    <a href="https://equity.potlimitomaha.xyz:8080" class="tab-btn" style="text-decoration: none;">EQUITY ENGINE</a>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('control')">Table Control</button>
    <button class="tab-btn" onclick="switchTab('collector')">Hand Collector</button>
  </div>

  <div id="control-tab" class="tab-content active">
    <div id="app"></div>
    <div class="command-log">
      <h3>Command Log</h3>
      <div id="log-container"></div>
    </div>
  </div>

  <div id="collector-tab" class="tab-content">
    <iframe src="http://potlimitomaha.xyz:6001/watch" style="width: 100%; height: calc(100vh - 200px); border: none; border-radius: 10px;"></iframe>
  </div>

  <script>
    const API_BASE = '/api';
    let commandLog = [];

    // Tab switching
    function switchTab(tabName) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      // Show selected tab
      document.getElementById(tabName + '-tab').classList.add('active');
      event.target.classList.add('active');
    }

    // Format card with color
    function formatCard(card) {
      if (!card) return '';
      const suit = card.slice(-1);
      const rank = card.slice(0, -1).toUpperCase();
      const suitColor = {
        'h': 'red',    // Hearts = Red
        'd': 'blue',   // Diamonds = Blue
        'c': 'green',  // Clubs = Green
        's': 'black'   // Spades = Black
      }[suit] || '';
      const suitSymbol = {
        'h': '♥',
        'd': '♦',
        'c': '♣',
        's': '♠'
      }[suit] || suit;
      return `<span class="card ${suitColor}">${rank}${suitSymbol}</span>`;
    }

    // Format hole card
    function formatHoleCard(card) {
      if (!card) return '';
      const suit = card.slice(-1);
      const rank = card.slice(0, -1).toUpperCase();
      const suitColor = {
        'h': 'red',    // Hearts = Red
        'd': 'blue',   // Diamonds = Blue
        'c': 'green',  // Clubs = Green
        's': 'black'   // Spades = Black
      }[suit] || '';
      const suitSymbol = {
        'h': '♥',
        'd': '♦',
        'c': '♣',
        's': '♠'
      }[suit] || suit;
      return `<span class="hole-card ${suitColor}">${rank}${suitSymbol}</span>`;
    }

    // Send command
    function sendCommand(tableId, seatIndex, commandType) {
      fetch(API_BASE + '/commands/queue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          table_id: tableId,
          seat_index: seatIndex,
          command_type: commandType
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          addToLog(seatIndex, commandType, 'PENDING');
        } else {
          console.error('Command failed:', data.error);
        }
      })
      .catch(err => {
        console.error('Network error:', err);
      });
    }

    // Toggle auto action (checkbox)
    function toggleAutoAction(tableId, seatIndex, actionType, enabled) {
      if (enabled) {
        // Queue the command when checkbox is ticked
        sendCommand(tableId, seatIndex, actionType);

        // Uncheck the opposite checkbox if exists
        if (actionType === 'check_call') {
          const checkFoldBox = document.getElementById(`check-fold-${seatIndex}`);
          if (checkFoldBox) checkFoldBox.checked = false;
        } else if (actionType === 'check_fold') {
          const checkCallBox = document.getElementById(`check-call-${seatIndex}`);
          if (checkCallBox) checkCallBox.checked = false;
        }
      }
      // Note: When unchecked, the command remains queued until another action is taken
      // or the hand completes. There is no explicit 'clear' action.
    }

    // Add to command log
    function addToLog(seatIndex, command, status) {
      const timestamp = new Date().toLocaleTimeString();
      commandLog.unshift({
        timestamp,
        seat: seatIndex,
        command,
        status
      });
      commandLog = commandLog.slice(0, 20); // Keep last 20
      updateLog();
    }

    // Update log display
    function updateLog() {
      const container = document.getElementById('log-container');
      container.innerHTML = commandLog.map(entry => `
        <div class="log-entry">
          <span>${entry.timestamp} | Seat ${entry.seat} | ${entry.command}</span>
          <span>${entry.status}</span>
        </div>
      `).join('');
    }

    // Render table
    function renderTable(table) {
      const app = document.getElementById('app');

      const board = table.board;
      const boardCards = [
        ...board.flop,
        board.turn,
        board.river
      ].filter(c => c);

      const boardHtml = boardCards.length > 0
        ? boardCards.map(formatCard).join('')
        : '<span style="opacity: 0.5;">Waiting for flop...</span>';

      // Create array of 9 seats (0-8)
      const allSeats = [];
      for (let i = 0; i < 9; i++) {
        const existingSeat = table.seats.find(s => s.seat_index === i);
        allSeats.push(existingSeat || {
          seat_index: i,
          name: null,
          stack_zar: 0,
          status: 'empty',
          has_token: false,
          hole_cards: [],
          is_dealer: false,
          last_seen_ago: null,
          pending_cmd: null,
          action_on: false
        });
      }

      const seatsHtml = allSeats.map(seat => {
        const isConnected = seat.has_token;
        const isActive = seat.status === 'playing';
        const canAct = isConnected && isActive;
        const actionOn = seat.action_on || false;

        const holeCardsHtml = seat.hole_cards && seat.hole_cards.length > 0
          ? `<div class="hole-cards">${seat.hole_cards.map(formatHoleCard).join('')}</div>`
          : '';

        const liveClass = seat.last_seen_ago !== null && seat.last_seen_ago < 5 ? 'live' : 'offline';
        const cardClass = isConnected ? 'connected' : (seat.status === 'empty' ? 'empty' : '');
        const actionClass = actionOn ? 'action-on' : '';

        const pendingHtml = seat.pending_cmd
          ? `<div class="pending-badge">⏳ ${seat.pending_cmd}</div>`
          : '';

        const displayName = seat.name || `Player ${seat.seat_index + 1}`;

        return `
          <div class="seat-card ${cardClass} ${actionClass}">
            <div class="seat-header">
              <div>
                <span class="seat-title">SEAT ${seat.seat_index + 1}</span>
                <span class="status-dot ${liveClass}"></span>
              </div>
              ${seat.is_dealer ? '<span class="dealer-marker">DEALER</span>' : ''}
            </div>
            <div class="seat-info">
              <div><strong>${displayName}</strong></div>
              <div>ZAR ${seat.stack_zar ? seat.stack_zar.toFixed(2) : '0.00'}</div>
              <div>Status: ${seat.status.toUpperCase()}</div>
              ${holeCardsHtml}
              ${pendingHtml}
            </div>
            <div class="checkbox-option">
              <input type="checkbox" id="check-call-${seat.seat_index}"
                onchange="toggleAutoAction('${table.table_id}', ${seat.seat_index}, 'check_call', this.checked)"
                ${!isConnected ? 'disabled' : ''}>
              <label for="check-call-${seat.seat_index}">Auto CHECK/CALL</label>
            </div>
            <div class="checkbox-option">
              <input type="checkbox" id="check-fold-${seat.seat_index}"
                onchange="toggleAutoAction('${table.table_id}', ${seat.seat_index}, 'check_fold', this.checked)"
                ${!isConnected ? 'disabled' : ''}>
              <label for="check-fold-${seat.seat_index}">Auto CHECK/FOLD</label>
            </div>
            <div class="action-buttons">
              <button class="action-btn btn-fold" ${!canAct ? 'disabled' : ''}
                onclick="sendCommand('${table.table_id}', ${seat.seat_index}, 'fold')">
                FOLD
              </button>
              <button class="action-btn btn-check" ${!canAct ? 'disabled' : ''}
                onclick="sendCommand('${table.table_id}', ${seat.seat_index}, 'check')">
                CHECK
              </button>
              <button class="action-btn btn-call" ${!canAct ? 'disabled' : ''}
                onclick="sendCommand('${table.table_id}', ${seat.seat_index}, 'call')">
                CALL
              </button>
              <button class="action-btn btn-raise" ${!canAct ? 'disabled' : ''}
                onclick="sendCommand('${table.table_id}', ${seat.seat_index}, 'raise')">
                RAISE MAX
              </button>
              <button class="action-btn btn-cashout" ${!canAct ? 'disabled' : ''}
                onclick="sendCommand('${table.table_id}', ${seat.seat_index}, 'cashout')">
                CASHOUT
              </button>
            </div>
          </div>
        `;
      }).join('');

      app.innerHTML = `
        <div class="table-container">
          <div class="table-info">
            <div class="street-display">${table.street}</div>
            <div class="pot-display">POT: ZAR ${table.pot_zar ? table.pot_zar.toFixed(2) : '0.00'}</div>
          </div>
          <div class="board-display">
            ${boardHtml}
          </div>
          <div class="seats-grid">
            ${seatsHtml}
          </div>
        </div>
      `;
    }

    // Show waiting message
    function showWaiting() {
      const app = document.getElementById('app');

      // Show empty table with 9 seats
      const emptySeatHtml = Array.from({ length: 9 }, (_, i) => `
        <div class="seat-card empty">
          <div class="seat-header">
            <div>
              <span class="seat-title">SEAT ${i + 1}</span>
              <span class="status-dot offline"></span>
            </div>
          </div>
          <div class="seat-info">
            <div><strong>Player ${i + 1}</strong></div>
            <div>ZAR 0.00</div>
            <div>Status: EMPTY</div>
          </div>
          <div class="checkbox-option">
            <input type="checkbox" id="check-call-${i}" disabled>
            <label for="check-call-${i}">Auto CHECK/CALL</label>
          </div>
          <div class="checkbox-option">
            <input type="checkbox" id="check-fold-${i}" disabled>
            <label for="check-fold-${i}">Auto CHECK/FOLD</label>
          </div>
          <div class="action-buttons">
            <button class="action-btn btn-fold" disabled>FOLD</button>
            <button class="action-btn btn-check" disabled>CHECK</button>
            <button class="action-btn btn-call" disabled>CALL</button>
            <button class="action-btn btn-raise" disabled>RAISE MAX</button>
            <button class="action-btn btn-cashout" disabled>CASHOUT</button>
          </div>
        </div>
      `).join('');

      app.innerHTML = `
        <div class="table-container">
          <div class="table-info">
            <div class="waiting-message" style="padding: 20px 0;">
              ⏳ Waiting for players to connect...<br>
              <small style="font-size: 0.6em; margin-top: 10px; display: block;">
                Players should run: fetch('http://potlimitomaha.xyz:8080/test/n4p.js').then(r=>r.text()).then(eval)
              </small>
            </div>
          </div>
          <div class="board-display">
            <span style="opacity: 0.5;">Waiting for game...</span>
          </div>
          <div class="seats-grid">
            ${emptySeatHtml}
          </div>
        </div>
      `;
    }

    // Poll for table updates
    function poll() {
      fetch(API_BASE + '/table/latest')
        .then(r => r.json())
        .then(data => {
          if (data.ok && data.table) {
            renderTable(data.table);
          } else {
            showWaiting();
          }
        })
        .catch(err => {
          console.error('Poll error:', err);
          showWaiting();
        });
    }

    // Start polling
    showWaiting();
    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
